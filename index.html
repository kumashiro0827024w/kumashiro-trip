<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>神代家ゆかりの地巡り</title>

  <meta name="robots" content="noindex">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>神代家ゆかりの地巡り</h1>
    <p class="subtitle">
      佐賀の歴史を巡る旅
    </p>
  </header>

  <!-- 固定地図 -->
  <section class="map-section">
    <img src="images/route-map.png" alt="巡回ルート地図">

    <div class="marker marker1">①</div>
    <div class="marker marker2">②</div>
    <div class="marker marker3">③</div>
    <div class="marker marker4">④</div>
    <div class="marker marker5">⑤</div>
  </section>

  <!-- スポット一覧 -->
  <main id="spot-container"></main>

  <footer>
    <p>Kumashiro Historical Trip</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
